services:
  postgres:
    image: postgres:16-alpine
    ports:
      # Different from simplicity-auth (54320) and schema-flow (54329)
      # so all three repos can run their tests at the same time without
      # port conflicts.
      - '54321:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 5s
      retries: 10
